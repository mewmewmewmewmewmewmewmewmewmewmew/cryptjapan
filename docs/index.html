<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CC &lt;&gt; JP</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px 24px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    header span {
      font-size: 13px;
      color: #555;
    }

    .filters {
      padding: 16px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      border-bottom: 1px solid #1a1a1a;
      background: #111;
    }

    select, button {
      background: #1c1c1c;
      border: 1px solid #2e2e2e;
      color: #e8e8e8;
      padding: 7px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }

    select:hover, button:hover { border-color: #444; }

    button#fetch-btn {
      background: #2563eb;
      border-color: #2563eb;
      color: #fff;
      font-weight: 500;
      padding: 7px 18px;
    }

    button#fetch-btn:hover { background: #1d4ed8; }
    button#fetch-btn:disabled { background: #1a3a7a; border-color: #1a3a7a; cursor: not-allowed; }

    button#refresh-list-btn { margin-left: auto; }
    button#refresh-list-btn:hover:not(:disabled),
    button#refresh-btn:hover:not(:disabled) { border-color: #555; }
    button#refresh-list-btn:disabled,
    button#refresh-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .status {
      padding: 10px 24px;
      font-size: 13px;
      color: #666;
      min-height: 36px;
    }

    .table-wrap {
      flex: 1;
      overflow-x: auto;
      padding: 0 24px 80px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead th {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid #222;
      color: #777;
      font-weight: 500;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }

    thead th:hover { color: #aaa; }
    thead th.sort-asc::after { content: " ↑"; color: #2563eb; }
    thead th.sort-desc::after { content: " ↓"; color: #2563eb; }

    tbody tr { border-bottom: 1px solid #181818; transition: background 0.1s; }
    tbody tr:hover { background: #161616; }

    td {
      padding: 10px 12px;
      vertical-align: middle;
      max-width: 320px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    td.price {
      font-variant-numeric: tabular-nums;
      color: #4ade80;
      white-space: nowrap;
    }

    td.currency { color: #555; font-size: 11px; }

    td a { color: #60a5fa; text-decoration: none; }
    td a:hover { text-decoration: underline; }

    .badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      background: #1e293b;
      color: #94a3b8;
    }

    .badge.me { background: #1c1a2e; color: #a78bfa; }

    .pagination {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 24px 72px;
      font-size: 13px;
      color: #666;
    }

    .pagination button {
      background: #1c1c1c;
      border: 1px solid #2e2e2e;
      color: #e8e8e8;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }

    .pagination button:hover:not(:disabled) { border-color: #444; }
    .pagination button:disabled { opacity: 0.3; cursor: not-allowed; }

    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      padding: 8px 16px;
      font-size: 11px;
      color: #333;
    }

    .empty { text-align: center; padding: 60px; color: #444; }
    .alt-loading { color: #333; font-size: 11px; }
    .alt-link { color: #a78bfa; text-decoration: none; }
    .alt-link:hover { text-decoration: underline; }
    .card-link { color: #e8e8e8; text-decoration: none; }
    .card-link:hover { text-decoration: underline; }
    .snkrdunk-price a { color: #38bdf8; text-decoration: none; }
    .snkrdunk-price a:hover { text-decoration: underline; }
    .price-sub { color: #fff; }
    .delta-pos { color: #4ade80; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .delta-neg { color: #f87171; font-variant-numeric: tabular-nums; white-space: nowrap; }

    .toggle-btn.active { background: #1e3a5f; border-color: #2563eb; color: #60a5fa; }

    table.hide-alt .alt-price,
    table.hide-alt .alt-delta,
    table.hide-alt .alt-pct,
    table.hide-alt .th-alt { display: none; }

    table.hide-snkrdunk .snkrdunk-price,
    table.hide-snkrdunk .snkrdunk-delta,
    table.hide-snkrdunk .snkr-pct,
    table.hide-snkrdunk .th-snkrdunk { display: none; }

    #lock-screen {
      position: fixed; inset: 0;
      background: #0f0f0f;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    #lock-screen form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 280px;
    }

    #lock-screen h2 { font-size: 16px; font-weight: 600; text-align: center; }

    #lock-screen input {
      background: #1c1c1c;
      border: 1px solid #2e2e2e;
      color: #e8e8e8;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      width: 100%;
    }

    #lock-screen input:focus { border-color: #444; }

    #lock-screen button {
      background: #2563eb;
      border: none;
      color: #fff;
      padding: 10px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    #lock-screen button:hover { background: #1d4ed8; }
    #lock-error { color: #f87171; font-size: 13px; text-align: center; min-height: 18px; }
  </style>
</head>
<body>

<div id="lock-screen">
  <form onsubmit="unlock(event)">
    <h2>CC &lt;&gt; JP</h2>
    <input type="password" id="pw-input" placeholder="Password" autofocus />
    <div id="lock-error"></div>
    <button type="submit">Enter</button>
  </form>
</div>

<header>
  <h1>CC &lt;&gt; JP</h1>
  <span>CollectorCrypt Marketplace</span>
  <button id="refresh-list-btn" onclick="refreshCardList()" disabled>↻ Refresh cards</button>
  <button id="refresh-btn" onclick="refreshPrices()" disabled>↻ Refresh prices</button>
</header>

<div class="filters">
  <select id="categories">
    <option value="Pokemon,One Piece">Pokemon + One Piece</option>
    <option value="Pokemon">Pokemon</option>
    <option value="One Piece">One Piece</option>
    <option value="Yu-Gi-Oh!">Yu-Gi-Oh!</option>
    <option value="Magic The Gathering">Magic The Gathering</option>
  </select>

  <select id="gradingCompany">
    <option value="PSA">PSA</option>
    <option value="BGS">BGS</option>
    <option value="CGC">CGC</option>
    <option value="">Any grader</option>
  </select>

  <select id="grade">
    <option value="GEM-MT 10">GEM-MT 10</option>
    <option value="MINT 9">MINT 9</option>
    <option value="NM-MT 8">NM-MT 8</option>
    <option value="NM 7">NM 7</option>
    <option value="">Any grade</option>
  </select>

  <select id="language">
    <option value="Japanese">Japanese</option>
    <option value="">Any language</option>
  </select>

  <select id="orderBy">
    <option value="listedDateDesc">Newest first</option>
    <option value="listedDateAsc">Oldest first</option>
    <option value="priceAsc">Price: low to high</option>
    <option value="priceDesc">Price: high to low</option>
  </select>

  <select id="step">
    <option value="24">24 per page</option>
    <option value="48" selected>48 per page</option>
    <option value="96">96 per page</option>
    <option value="all">Show all</option>
  </select>

  <button id="toggle-alt" class="toggle-btn active" onclick="toggleSource('alt')">Alt</button>
  <button id="toggle-snkrdunk" class="toggle-btn active" onclick="toggleSource('snkrdunk')">SNKRDUNK</button>
  <button id="fetch-btn" onclick="fetchListings(true)">Fetch listings</button>
</div>

<div class="status" id="status">Ready.</div>

<div class="table-wrap">
  <table id="results-table">
    <thead>
      <tr>
        <th onclick="sortBy('itemName')">Card</th>
        <th onclick="sortBy('grade')">Grade</th>
        <th onclick="sortBy('gradingID')">PSA Cert</th>
        <th onclick="sortBy('price')">Price</th>
        <th class="th-alt" onclick="sortBy('altPrice')">Alt $</th>
        <th class="th-alt" onclick="sortBy('altDelta')">Alt Δ</th>
        <th class="th-alt" onclick="sortBy('altPct')">Alt %</th>
        <th class="th-snkrdunk" onclick="sortBy('snkrdunkPrice')">SNKRDUNK</th>
        <th class="th-snkrdunk" onclick="sortBy('snkrdunkDelta')">SNKRDUNK Δ</th>
        <th class="th-snkrdunk" onclick="sortBy('snkrdunkPct')">SNKR %</th>
      </tr>
    </thead>
    <tbody id="results-body"></tbody>
  </table>
  <div class="empty" id="empty-msg">Hit "Fetch listings" to load cards.</div>
</div>

<div class="pagination" id="pagination" style="display:none">
  <button id="prev-btn" onclick="goPage(-1)">← Prev</button>
  <span id="page-info"></span>
  <button id="next-btn" onclick="goPage(1)">Next →</button>
</div>

<footer>v0.19</footer>

<script>
  const PASSWORD_HASH = "__PASSWORD_HASH__";

  async function sha256(str) {
    if (!window.isSecureContext || !crypto.subtle) {
      throw new Error("HTTPS required — please access via https://");
    }
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
  }

  async function unlock(e) {
    e.preventDefault();
    try {
      const input = document.getElementById("pw-input").value;
      const hash = await sha256(input);
      if (hash === PASSWORD_HASH) {
        sessionStorage.setItem("auth", "1");
        document.getElementById("lock-screen").remove();
        loadCardCache();
      } else {
        document.getElementById("lock-error").textContent = "Incorrect password.";
      }
    } catch (err) {
      document.getElementById("lock-error").textContent = err.message;
    }
  }

  if (sessionStorage.getItem("auth") === "1") {
    document.getElementById("lock-screen").remove();
    loadCardCache();
  }

  const WORKER_URL = "https://cryptjapan-proxy.mew-860.workers.dev";

  let allRows = [];
  let sortCol = null;
  let sortDir = 1;
  let currentPage = 1;
  let totalPages = 1;

  function goPage(delta) {
    const next = currentPage + delta;
    if (next < 1 || next > totalPages) return;
    currentPage = next;
    fetchListings();
  }

  function updatePagination(total) {
    totalPages = total;
    const pag = document.getElementById("pagination");
    pag.style.display = totalPages > 1 ? "flex" : "none";
    document.getElementById("page-info").textContent = `Page ${currentPage} of ${totalPages}`;
    document.getElementById("prev-btn").disabled = currentPage <= 1;
    document.getElementById("next-btn").disabled = currentPage >= totalPages;
  }

  async function fetchListings(resetPage = false) {
    if (resetPage) currentPage = 1;
    const btn = document.getElementById("fetch-btn");
    const status = document.getElementById("status");
    btn.disabled = true;

    const stepSel = document.getElementById("step").value;
    const showAll = stepSel === "all";
    const stepVal = showAll ? "96" : stepSel;

    const baseParams = {
      cardType: "Card",
      categories: document.getElementById("categories").value,
      gradingCompany: document.getElementById("gradingCompany").value,
      grade: document.getElementById("grade").value,
      language: document.getElementById("language").value,
      orderBy: document.getElementById("orderBy").value,
      step: stepVal,
    };

    async function fetchPage(page) {
      const params = new URLSearchParams({ ...baseParams, page });
      for (const [k, v] of [...params]) { if (!v) params.delete(k); }
      const res = await fetch(`${WORKER_URL}/marketplace?${params}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    status.textContent = "Fetching…";

    try {
      const firstData = await fetchPage(showAll ? 1 : currentPage);
      let cards = (firstData.filterNFtCard || []).filter(c => c.listing);
      const total = firstData.findTotal ?? cards.length;
      const pages = firstData.totalPages ?? 1;

      await getSolPrice();
      updatePagination(showAll ? 1 : pages);

      if (showAll) {
        // Render first page immediately so user sees results while rest loads
        allRows = cards;
        renderTable(cards);
        repopulateAltCells(cards);
        repopulateSnkrdunkCells(cards);
        window.scrollTo(0, 0);

        if (pages > 1) {
          const tbody = document.getElementById("results-body");
          document.getElementById("empty-msg").style.display = "none";
          for (let p = 2; p <= pages; p++) {
            status.textContent = `Loading page ${p} of ${pages} — ${cards.length} cards so far…`;
            await new Promise(r => setTimeout(r, 1000));
            try {
              const d = await fetchPage(p);
              const newCards = (d.filterNFtCard || []).filter(c => c.listing);
              cards = cards.concat(newCards);
              allRows = cards;
              tbody.insertAdjacentHTML("beforeend", newCards.map(buildRowHtml).join(""));
              repopulateAltCells(newCards);
              repopulateSnkrdunkCells(newCards);
            } catch (e) {
              status.textContent = `Stopped at page ${p} (${e.message}) — showing ${cards.length} cards`;
              break;
            }
          }
        }

        const msg = `${cards.length.toLocaleString()} listings loaded`;
        status.textContent = msg;
        saveCardCache(cards, baseParams, currentPage, 1, msg);
        fetchAltPrices(cards);
        fetchSnkrdunkPrices(cards);
      } else {
        allRows = cards;
        const msg = `${total.toLocaleString()} total listings — page ${currentPage} of ${pages}`;
        status.textContent = msg;
        renderTable(cards);
        repopulateAltCells(cards);
        repopulateSnkrdunkCells(cards);
        saveCardCache(cards, baseParams, currentPage, pages, msg);
        fetchAltPrices(cards);
        fetchSnkrdunkPrices(cards);
        window.scrollTo(0, 0);
      }

      document.getElementById("refresh-list-btn").disabled = false;
      document.getElementById("refresh-btn").disabled = false;
    } catch (e) {
      status.textContent = `Error: ${e.message}`;
    } finally {
      btn.disabled = false;
    }
  }

  function buildRowHtml(c) {
    const l = c.listing;
    const cardUrl = `https://collectorcrypt.com/assets/solana/${c.nftAddress}`;
    const price = Number(l.price);
    const solAmt = `${price % 1 === 0 ? price : price.toFixed(2)} SOL`;
    const priceStr = l.currency === "SOL"
      ? (solUsd ? `$${(price * solUsd).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})} <span class="price-sub">(${solAmt})</span>` : solAmt)
      : `$${price.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
    const certDisplay = c.gradingCompany === "PSA"
      ? `<a href="https://www.psacard.com/cert/${esc(c.gradingID)}/psa" target="_blank" rel="noopener" style="color:#94a3b8">${esc(c.gradingID)}</a>`
      : esc(c.gradingID);
    return `<tr>
      <td title="${esc(c.itemName)}"><a href="${cardUrl}" target="_blank" rel="noopener" class="card-link">${boldCardName(c.itemName)}</a></td>
      <td title="${esc(c.grade)}">${esc((c.gradingCompany || "") + " " + ((c.grade || "").match(/(\d+)$/)?.[1] || c.grade))}</td>
      <td>${certDisplay}</td>
      <td class="price">${priceStr}</td>
      <td class="alt-price" data-cert="${esc(c.gradingID)}"><span class="alt-loading">···</span></td>
      <td class="alt-delta" data-cert="${esc(c.gradingID)}"></td>
      <td class="alt-pct" data-cert="${esc(c.gradingID)}"></td>
      <td class="snkrdunk-price" data-cert="${esc(c.gradingID)}"><span class="alt-loading">···</span></td>
      <td class="snkrdunk-delta" data-cert="${esc(c.gradingID)}"></td>
      <td class="snkr-pct" data-cert="${esc(c.gradingID)}"></td>
    </tr>`;
  }

  function renderTable(rows) {
    const tbody = document.getElementById("results-body");
    const empty = document.getElementById("empty-msg");
    if (!rows.length) {
      tbody.innerHTML = "";
      empty.style.display = "block";
      return;
    }
    empty.style.display = "none";
    tbody.innerHTML = rows.map(buildRowHtml).join("");
  }

  function sortBy(col) {
    const ths = document.querySelectorAll("thead th");
    ths.forEach(th => th.classList.remove("sort-asc", "sort-desc"));

    if (sortCol === col) { sortDir *= -1; } else { sortCol = col; sortDir = 1; }

    const colOrder = ["itemName","grade","gradingID","price","altPrice","altDelta","altPct","snkrdunkPrice","snkrdunkDelta","snkrdunkPct"];
    const thIdx = colOrder.indexOf(col);
    if (thIdx >= 0) {
      ths[thIdx].classList.add(sortDir === 1 ? "sort-asc" : "sort-desc");
    }

    const sorted = [...allRows].sort((a, b) => {
      let av, bv;
      if (col === "price") {
        av = Number(a.listing?.price ?? 0); bv = Number(b.listing?.price ?? 0);
      } else if (col === "altPrice") {
        av = a._altPrice ?? -Infinity; bv = b._altPrice ?? -Infinity;
      } else if (col === "altDelta") {
        av = a._altDelta ?? -Infinity; bv = b._altDelta ?? -Infinity;
      } else if (col === "altPct") {
        av = a._altPct ?? -Infinity; bv = b._altPct ?? -Infinity;
      } else if (col === "snkrdunkPrice") {
        av = a._snkrdunkPrice ?? -Infinity; bv = b._snkrdunkPrice ?? -Infinity;
      } else if (col === "snkrdunkDelta") {
        av = a._snkrdunkDelta ?? -Infinity; bv = b._snkrdunkDelta ?? -Infinity;
      } else if (col === "snkrdunkPct") {
        av = a._snkrdunkPct ?? -Infinity; bv = b._snkrdunkPct ?? -Infinity;
      } else {
        av = a[col] ?? ""; bv = b[col] ?? "";
      }
      if (typeof av === "string") return av.localeCompare(bv) * sortDir;
      return (av - bv) * sortDir;
    });
    renderTable(sorted);
    repopulateAltCells(sorted);
    repopulateSnkrdunkCells(sorted);
  }

  function repopulateAltCells(rows) {
    for (const c of rows) {
      if (!c.gradingID || !altCache.has(c.gradingID)) continue;
      const result = altCache.get(c.gradingID);
      const cur = c.listing?.currency;
      const raw = Number(c.listing?.price ?? 0);
      const usdc = cur === "USDC" ? raw : cur === "SOL" && solUsd ? raw * solUsd : null;
      updateAltCell(c.gradingID, result, usdc);
    }
  }

  function snkrdunkKwKey(c) {
    const gradeNum = (c.grade || "").match(/(\d+)$/)?.[1];
    const psaGrade = gradeNum ? `PSA${gradeNum}` : "";
    const cleanName = c.name || c.cardName || null;
    const kw = cleanName ? snkrdunkKeywordsFromClean(cleanName, c.itemName) : snkrdunkKeywords(c.itemName);
    return `${kw}|${psaGrade}`;
  }

  function repopulateSnkrdunkCells(rows) {
    for (const c of rows) {
      if (!c.gradingID) continue;
      const key = snkrdunkKwKey(c);
      if (!snkrdunkCache.has(key)) continue;
      updateSnkrdunkCell(c.gradingID, snkrdunkCache.get(key));
    }
  }

  // ── Alt.xyz price fetching ───────────────────────────────────────────
  const altCache = new Map();

  const CERT_QUERY = `query Cert($certNumber: String!) {
    cert(certNumber: $certNumber) {
      certNumber gradeNumber gradingCompany
      asset { id __typename }
      __typename
    }
  }`;

  const ASSET_QUERY = `query AssetDetails($id: ID!, $tsFilter: TimeSeriesFilter!) {
    asset(id: $id) {
      id
      predictedPrice(tsFilter: $tsFilter)
      __typename
    }
  }`;

  async function altPost(operation, variables) {
    const res = await fetch(`${WORKER_URL}/alt/${operation}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ operationName: operation, query: operation === "Cert" ? CERT_QUERY : ASSET_QUERY, variables }),
    });
    return res.json();
  }

  async function fetchAltPrice(certNumber) {
    if (altCache.has(certNumber)) return altCache.get(certNumber);
    try {
      const certData = await altPost("Cert", { certNumber });
      const cert = certData.data?.cert;
      if (!cert?.asset?.id) return null;
      const assetData = await altPost("AssetDetails", {
        id: cert.asset.id,
        tsFilter: { gradeNumber: cert.gradeNumber, gradingCompany: cert.gradingCompany },
      });
      const result = {
        price: assetData.data?.asset?.predictedPrice ?? null,
        assetId: cert.asset.id,
      };
      altCache.set(certNumber, result);
      return result;
    } catch { return null; }
  }

  let solUsd = null;

  async function getSolPrice() {
    if (solUsd !== null) return solUsd;
    try {
      const res = await fetch(`${WORKER_URL}/sol-price`);
      const data = await res.json();
      solUsd = data.usd ?? null;
    } catch { solUsd = null; }
    return solUsd;
  }

  function updateAltCell(certNumber, result, ccPriceUsdc) {
    const priceCell = document.querySelector(`.alt-price[data-cert="${certNumber}"]`);
    const deltaCell = document.querySelector(`.alt-delta[data-cert="${certNumber}"]`);
    const pctCell = document.querySelector(`.alt-pct[data-cert="${certNumber}"]`);
    if (!priceCell) return;
    if (!result?.price) {
      priceCell.textContent = "—";
      if (pctCell) pctCell.textContent = "";
      return;
    }
    const altPrice = Number(result.price);
    const url = `https://alt.xyz/itm/${result.assetId}/research`;
    priceCell.innerHTML = `<a href="${url}" target="_blank" rel="noopener" class="alt-link">$${altPrice.toFixed(2)}</a>`;
    if (ccPriceUsdc != null) {
      const delta = altPrice - ccPriceUsdc;
      const pct = (delta / ccPriceUsdc) * 100;
      const sign = delta >= 0 ? "+" : "";
      const cls = delta >= 0 ? "delta-pos" : "delta-neg";
      if (deltaCell) deltaCell.innerHTML = `<span class="${cls}">${sign}$${Math.abs(delta).toFixed(2)}</span>`;
      if (pctCell) pctCell.innerHTML = `<span class="${cls}">${sign}${Math.abs(pct).toFixed(1)}%</span>`;
    }
  }

  async function fetchAltPrices(cards, concurrency = 8) {
    const rate = await getSolPrice();
    await getJpyRate();
    const certPrices = new Map();
    for (const c of cards) {
      if (!c.gradingID) continue;
      const cur = c.listing?.currency;
      const raw = Number(c.listing?.price ?? 0);
      const usdc = cur === "USDC" ? raw : cur === "SOL" && rate ? raw * rate : null;
      if (usdc !== null) certPrices.set(c.gradingID, usdc);
    }
    const certs = [...new Set(cards.map(c => c.gradingID).filter(Boolean))];
    for (let i = 0; i < certs.length; i += concurrency) {
      await Promise.all(
        certs.slice(i, i + concurrency).map(async cert => {
          const result = await fetchAltPrice(cert);
          const usdc = certPrices.get(cert);
          updateAltCell(cert, result, usdc);
          if (result?.price != null) {
            const altPrice = Number(result.price);
            for (const c of allRows) {
              if (c.gradingID === cert) {
                c._altPrice = altPrice;
                c._altDelta = usdc != null ? altPrice - usdc : null;
                c._altPct = usdc != null ? ((altPrice - usdc) / usdc) * 100 : null;
              }
            }
          }
        })
      );
    }
  }
  // ─────────────────────────────────────────────────────────────────────

  // ── SNKRDUNK price fetching ──────────────────────────────────────────
  const snkrdunkCache = new Map(); // key: `${kw}|${psaGrade}`
  let jpyUsd = null;

  async function getJpyRate() {
    if (jpyUsd !== null) return jpyUsd;
    try {
      const res = await fetch(`${WORKER_URL}/jpy-rate`);
      const data = await res.json();
      jpyUsd = data.usdPerJpy ?? null;
    } catch { jpyUsd = null; }
    return jpyUsd;
  }

  // Build SNKRDUNK keywords from the CC clean card name field (e.g. "Shining Lugia-Holo" → "Shining Lugia 058")
  function snkrdunkKeywordsFromClean(cleanName, itemName) {
    const numMatch = itemName.match(/#(\d+)/);
    const num = numMatch ? numMatch[1].padStart(3, "0") : "";
    // Strip PSA/grading company suffixes and holo/rarity suffixes (CC "Card Name" field includes them)
    const baseName = cleanName.replace(/\s*-.*$/, "").replace(/\s*(PSA|BGS|CGC|SGC).*$/i, "").trim();
    return `${baseName} ${num}`.trim();
  }

  // Extract "CardName num" from CC itemName — forward parse, then backward fallback for
  // non-standard formats like "2017 #58 JAPANESE SUN & MOON ... SHINING LUGIA PSA 10"
  function snkrdunkKeywords(itemName) {
    const m = itemName.match(/#(\d+)\s+(.+)/);
    if (!m) return itemName;
    const num = m[1].padStart(3, "0");
    const rest = m[2];
    // "Full Art/Braixen" → take the part after "/"
    const slashMatch = rest.match(/\b\w+\/(\w+)/);
    if (slashMatch) return `${slashMatch[1]} ${num}`.trim();
    const stopWords = new Set(["psa","bgs","cgc","sgc","japanese","english","holo","reverse","sar","sr","ur","rr","hr","chr","csr","full","secret","pokemon","magic"]);
    const words = rest.split(/\s+/);
    // Forward: take 1-2 name words from right after the card number
    // Stop at a dash — everything after is a rarity/variant suffix (e.g. "Squirtle-Holo" → "Squirtle")
    const fwdWords = [];
    for (const w of words) {
      if (stopWords.has(w.toLowerCase())) break;
      if (w.includes("-")) { fwdWords.push(w.split("-")[0]); break; }
      fwdWords.push(w);
      if (fwdWords.length >= 2) break;
    }
    if (fwdWords.length > 0) return `${fwdWords.join(" ")} ${num}`.trim();
    // Backward fallback: find grade marker and take 1-2 words that precede it
    const psaIdx = words.findIndex(w => /^(psa|bgs|cgc|sgc)$/i.test(w));
    if (psaIdx > 0) {
      const bwdWords = [];
      for (let i = psaIdx - 1; i >= 0 && bwdWords.length < 2; i--) {
        const w = words[i];
        if (stopWords.has(w.toLowerCase()) || /^[&]$/.test(w)) break;
        bwdWords.unshift(w);
      }
      if (bwdWords.length > 0) return `${bwdWords.join(" ")} ${num}`.trim();
    }
    return num;
  }

  // Bold the card name + number extracted by snkrdunkKeywords within the full itemName display
  function boldCardName(itemName) {
    const kw = snkrdunkKeywords(itemName);
    const numMatch = kw.match(/(\d+)$/);
    if (!numMatch) return esc(itemName);
    const num = numMatch[1];
    const nameOnly = kw.slice(0, -num.length).trim();
    let result = esc(itemName);
    result = result.replace(`#${num}`, `<b>#${num}</b>`);
    if (nameOnly) {
      const pat = nameOnly.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      result = result.replace(new RegExp(pat), `<b>${esc(nameOnly)}</b>`);
    }
    return result;
  }

  function updateSnkrdunkCell(certNumber, result) {
    const cell = document.querySelector(`.snkrdunk-price[data-cert="${certNumber}"]`);
    const deltaCell = document.querySelector(`.snkrdunk-delta[data-cert="${certNumber}"]`);
    const pctCell = document.querySelector(`.snkr-pct[data-cert="${certNumber}"]`);
    if (!cell) return;
    if (!result?.price) {
      if (result?.priceType === "na" && result?.apparelId) {
        const naUrl = `https://snkrdunk.com/apparels/${result.apparelId}`;
        cell.innerHTML = `<a href="${naUrl}" target="_blank" rel="noopener" style="color:#555">N/A</a>`;
      } else {
        cell.textContent = "—";
      }
      if (deltaCell) deltaCell.textContent = "";
      if (pctCell) pctCell.textContent = "";
      return;
    }
    const jpy = result.price;
    const usdSnkr = jpyUsd ? jpy * jpyUsd : null;
    const url = `https://snkrdunk.com/apparels/${result.apparelId}`;
    const label = result.priceType === "ask" ? " ask" : "";
    const usdPart = usdSnkr != null ? `$${usdSnkr.toFixed(0)}${label} ` : "";
    cell.innerHTML = `<a href="${url}" target="_blank" rel="noopener">${usdPart}<span class="price-sub">(¥${jpy.toLocaleString()})</span></a>`;
    if (usdSnkr != null) {
      const row = allRows.find(c => c.gradingID === certNumber);
      if (row) {
        const cur = row.listing?.currency;
        const raw = Number(row.listing?.price ?? 0);
        const ccUsd = cur === "USDC" ? raw : cur === "SOL" && solUsd ? raw * solUsd : null;
        if (ccUsd != null) {
          const delta = usdSnkr - ccUsd;
          const pct = (delta / ccUsd) * 100;
          row._snkrdunkDelta = delta;
          row._snkrdunkPct = pct;
          const sign = delta >= 0 ? "+" : "";
          const cls = delta >= 0 ? "delta-pos" : "delta-neg";
          if (deltaCell) deltaCell.innerHTML = `<span class="${cls}">${sign}$${Math.abs(delta).toFixed(0)}</span>`;
          if (pctCell) pctCell.innerHTML = `<span class="${cls}">${sign}${Math.abs(pct).toFixed(1)}%</span>`;
        }
      }
    }
  }

  async function fetchSnkrdunkPrices(cards, concurrency = 4) {
    await getJpyRate();

    // Deduplicate by computed keywords+grade — multiple CC listings of the same card
    // often have slightly different itemName strings but resolve to identical searches
    const kwGroups = new Map();
    for (const c of cards) {
      if (!c.gradingID) continue;
      const gradeNum = (c.grade || "").match(/(\d+)$/)?.[1];
      const psaGrade = gradeNum ? `PSA${gradeNum}` : "";
      const cleanName = c.name || c.cardName || null;
      const kw = cleanName ? snkrdunkKeywordsFromClean(cleanName, c.itemName) : snkrdunkKeywords(c.itemName);
      const kwKey = snkrdunkKwKey(c);
      if (!kwGroups.has(kwKey)) kwGroups.set(kwKey, { kw, psaGrade, kwKey, grpCards: [] });
      kwGroups.get(kwKey).grpCards.push(c);
    }

    const entries = [...kwGroups.values()];
    for (let i = 0; i < entries.length; i += concurrency) {
      await Promise.all(
        entries.slice(i, i + concurrency).map(async ({ kw, psaGrade, kwKey, grpCards }) => {
          let result;
          if (snkrdunkCache.has(kwKey)) {
            result = snkrdunkCache.get(kwKey);
          } else {
            try {
              const res = await fetch(`${WORKER_URL}/snkrdunk/price?keywords=${encodeURIComponent(kw)}&grade=${encodeURIComponent(psaGrade)}`);
              const data = await res.json();
              result = (data.price != null || data.apparelId != null)
                ? { price: data.price ?? null, apparelId: data.apparelId, priceType: data.priceType }
                : null;
            } catch { result = null; }
            snkrdunkCache.set(kwKey, result);
          }
          for (const c of grpCards) {
            updateSnkrdunkCell(c.gradingID, result);
            const row = allRows.find(r => r.gradingID === c.gradingID);
            if (row) row._snkrdunkPrice = result?.price ?? null;
          }
        })
      );
    }
  }
  // ─────────────────────────────────────────────────────────────────────

  async function refreshPrices() {
    const btn = document.getElementById("refresh-btn");
    btn.disabled = true;
    // Clear cache only for the cards currently shown (other pages remain cached)
    const snkrKeys = new Set(allRows.map(c => snkrdunkKwKey(c)));
    for (const c of allRows) { if (c.gradingID) altCache.delete(c.gradingID); }
    for (const k of snkrKeys) snkrdunkCache.delete(k);
    // Reset visible cells to loading state
    for (const c of allRows) {
      const cert = c.gradingID;
      const altCell = document.querySelector(`.alt-price[data-cert="${cert}"]`);
      if (altCell) altCell.innerHTML = '<span class="alt-loading">···</span>';
      for (const cls of ["alt-delta","alt-pct","snkrdunk-delta","snkr-pct"]) {
        const el = document.querySelector(`.${cls}[data-cert="${cert}"]`);
        if (el) el.textContent = "";
      }
      const snkrCell = document.querySelector(`.snkrdunk-price[data-cert="${cert}"]`);
      if (snkrCell) snkrCell.innerHTML = '<span class="alt-loading">···</span>';
    }
    await Promise.all([fetchAltPrices(allRows), fetchSnkrdunkPrices(allRows)]);
    btn.disabled = false;
  }

  function saveCardCache(rows, filters, page, pages, statusText) {
    try {
      sessionStorage.setItem("cardListCache", JSON.stringify({ rows, filters, page, pages, statusText }));
    } catch {} // quota exceeded — skip silently
  }

  async function loadCardCache() {
    try {
      const raw = sessionStorage.getItem("cardListCache");
      if (!raw) return;
      const cached = JSON.parse(raw);
      if (!cached?.rows?.length) return;
      // Restore filter selects
      const f = cached.filters || {};
      const filterMap = { categories: "categories", gradingCompany: "gradingCompany", grade: "grade", language: "language", orderBy: "orderBy", step: "step" };
      for (const [param, id] of Object.entries(filterMap)) {
        const el = document.getElementById(id);
        if (el && f[param] != null) el.value = f[param];
      }
      allRows = cached.rows;
      currentPage = cached.page ?? 1;
      totalPages = cached.pages ?? 1;
      await getSolPrice();
      await getJpyRate();
      renderTable(allRows);
      updatePagination(totalPages);
      document.getElementById("status").textContent = (cached.statusText || "") + " (cached)";
      document.getElementById("refresh-list-btn").disabled = false;
      document.getElementById("refresh-btn").disabled = false;
      repopulateAltCells(allRows);
      repopulateSnkrdunkCells(allRows);
    } catch {}
  }

  async function refreshCardList() {
    await fetchListings(true);
  }

  function toggleSource(source) {
    const btn = document.getElementById(`toggle-${source}`);
    const table = document.getElementById("results-table");
    btn.classList.toggle("active");
    table.classList.toggle(`hide-${source}`, !btn.classList.contains("active"));
  }

  function esc(s) {
    return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
</script>
</body>
